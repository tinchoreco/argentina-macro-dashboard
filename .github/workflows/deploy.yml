name: Deploy to GitHub Pages

on:
  # Run on pushes to main (after ETL commits data updates, or manual pushes)
  push:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Pages deployment requires these permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments overwriting each other
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build static site
        run: python scripts/build_site.py --output _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
